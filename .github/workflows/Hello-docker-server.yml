name: Hello-docker-server-dev
on: 
  workflow_dispatch:
jobs:
  hello-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: build and don't push image
        run: |
          while read line; do
            echo "Building for: $line"
            docker build --build-arg CUSTOMER_NAME=$line --build-arg PORT=3000 -f Dockerfile.helloserver -t $line .
          done < list.txt
      - name: run hello container
        run: |
            docker run -d -p 8080:3000 banna
            sleep 2
            curl http://localhost:8080/welcome