name: Hello-docker-server-prod
on: 
  workflow_dispatch:
jobs:
  hello-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to GHCR
        run: 
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: build and push image
        run: |
          while read line; do
            echo "Building for: $line"
            docker build --build-arg CUSTOMER_NAME=$line -f Dockerfile.helloserver -t ghcr.io/${{ github.repository_owner }}/hello:$line .
            docker push ghcr.io/${{ github.repository_owner }}/hello:$line
          done < list.txt

